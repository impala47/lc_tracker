name: Sync LeetCode Activity

on:
  schedule:
    - cron: '0 */6 * * *' # Executes every 6 hours
  workflow_dispatch: {} # Allows manual force-sync from the GitHub Actions UI

# Allow the job to commit the updated data file back to the repo.
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Tracker Sync Script
        env:
          LEETCODE_USERNAME: 'mohak47'
          # Optional — set these repo secrets for a full, accurate solved-history sync.
          # Without LEETCODE_SESSION the sync falls back to the 20 most recent solves.
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF: ${{ secrets.LEETCODE_CSRF }}
        run: python scripts/sync.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/striver_sheet.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated leetcode sync [skip ci]" && git push)
