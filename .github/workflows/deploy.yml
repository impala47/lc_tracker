name: Deploy to GitHub Pages

on:
  # Rebuild when source or data changes on main.
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'data/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/deploy.yml'
  # Rebuild after every automated sync. `workflow_run` fires even when the
  # sync's commit was pushed with the default GITHUB_TOKEN (a plain `push`
  # event would not), so this is what actually redeploys after a data sync.
  workflow_run:
    workflows: ['Sync LeetCode Activity']
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
